# cvt.ini — CVT startup configuration
#
# All keys are optional.  Uncomment and change a value to override the default.
# The program reads this file once on startup and never modifies it.
# Closing and reopening the program resets all settings to these values.
#
# The file is searched for in the current working directory first, then the
# directory containing the cvt executable, then its parent directory.

# ---------------------------------------------------------------------------
# UI / display
# ---------------------------------------------------------------------------

# show_ui = true            # Show the control panel on startup (toggle: F1)
# show_box = false           # Show the simulation box on startup
# basic_controls_open = false # Whether the "Basic controls" panel starts open
# lighting_level = 14        # Initial lighting level (0–29)

# ---------------------------------------------------------------------------
# Structure-factor computation
# ---------------------------------------------------------------------------

# sf_use_gpu = true                  # Use GPU path by default
# sf_suppress_central_peak = true    # Suppress the k=0 peak by default
# sf_cpu_modes_per_step = 32         # CPU batch: wavevector modes per frame (8–512)
# sf_gpu_rows_per_step = 16          # GPU batch: image rows per frame (4–128)
